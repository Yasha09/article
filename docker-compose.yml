services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs_crud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nestjs_crud
      POSTGRES_USER: nestjs_crud
      POSTGRES_PASSWORD: nestjs_crud
    ports:
      - "5432:5432"
    volumes:
      - nestjs_crud_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nestjs_crud_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nestjs_crud_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  nestjs_crud_pg_data:
  nestjs_crud_redis_data:
